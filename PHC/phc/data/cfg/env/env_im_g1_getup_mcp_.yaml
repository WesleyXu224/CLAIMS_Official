# if given, will override the device setting in gym. 
task: HumanoidImMCPGetup
project_name: "PHC"
notes:  "Progressive MCP without softmax, zero out far"

motion_file: ""
num_envs: 512
env_spacing: 2
episode_length: 300
is_flag_run: False
enable_debug_vis: False
sym_loss_coef: 1
fut_tracks: False
obs_v: 6
auto_pmcp: False
auto_pmcp_soft: True

######## Dumping offline dataset configs ########
add_obs_noise: False
add_action_noise: False
action_noise_std: 0.05
mlp_bypass: False
mlp_model_path: ""
start_idx: 0
collect_dataset: False

######## PNN Configs ########
has_pnn: True
fitting: True
num_prim: 4
training_prim: 0
actors_to_load: 4
has_lateral: False
models: []

######## Getup Configs ########
zero_out_far: True
zero_out_far_train: False
cycle_motion: True
getup_udpate_epoch: 1000

getup_schedule: True
recoverySteps: 90
zero_out_far_steps: 90
recoveryEpisodeProb: 0.5
fallInitProb: 0.3
hard_negative: False

z_activation: "silu"

kp_scale: 1

power_reward: True
power_coefficient: 0.00005

shape_resampling_interval: 500

control_mode: "isaac_pd"
power_scale: 1.0
controlFrequencyInv: 2 # 30 Hz
stateInit: "Random"  
hybridInitProb: 0.5
numAMPObsSteps: 10

###############
default_humanoid_mass: 51.436 # H1 config #
real_weight: True #
# kp_scale: 1
remove_toe_im: False # For imitation  #
# power_reward: True
# power_coefficient: 0.0005 #
powerScale: 1.0 #
# getup_schedule: False #
# recoverySteps: 90 #
# recoveryEpisodeProb: 0.5 #
# fallInitProb: 0.3 #
masterfoot: False #
freeze_toe: false #
# sym_loss_coef: 1 #
big_ankle: True #
###############

local_root_obs: True
root_height_obs: True
key_bodies: ["left_ankle_roll_link", "right_ankle_roll_link", "left_zero_link",  "right_zero_link"]
contact_bodies: ["left_ankle_roll_link", "right_ankle_roll_link"]
reset_bodies:  ['pelvis', 'left_hip_pitch_link', 'left_hip_roll_link', 'left_hip_yaw_link', 'left_knee_link', 'left_ankle_pitch_link', 'left_ankle_roll_link', 'right_hip_pitch_link', 'right_hip_roll_link', 'right_hip_yaw_link', 'right_knee_link', 'right_ankle_pitch_link', 'right_ankle_roll_link', 'torso_link', 'left_shoulder_pitch_link', 'left_shoulder_roll_link', 'left_shoulder_yaw_link', 'left_elbow_pitch_link', 'left_elbow_roll_link', 'left_zero_link', 'left_one_link', 'left_two_link', 'left_three_link', 'left_four_link', 'left_five_link', 'left_six_link', 'right_shoulder_pitch_link', 'right_shoulder_roll_link', 'right_shoulder_yaw_link', 'right_elbow_pitch_link', 'right_elbow_roll_link', 'right_zero_link', 'right_one_link', 'right_two_link', 'right_three_link', 'right_four_link', 'right_five_link', 'right_six_link']
terminationHeight: 0.15
enableEarlyTermination: True
terminationDistance: 0.25

### Fut config
numTrajSamples: 3
trajSampleTimestepInv: 30 #
enableTaskObs: True

asset:
  assetRoot: "/"
  assetFileName: "phc/data/assets/robot/unitree_g1/g1_29dof_anneal_23dof.xml"

plane:
  staticFriction: 1.0
  dynamicFriction: 1.0
  restitution: 0.0

sim:
substeps: 2
physx:
  num_threads: 4
  solver_type: 1  # 0: pgs, 1: tgs
  num_position_iterations: 4
  num_velocity_iterations: 0
  contact_offset: 0.02
  rest_offset: 0.0
  bounce_threshold_velocity: 0.2
  max_depenetration_velocity: 10.0
  default_buffer_size_multiplier: 10.0

flex:
  num_inner_iterations: 10
  warm_start: 0.25
